<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calorie Requirement Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; cursor: pointer; font-size: 16px; width: 100%; }
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Daily Calorie Requirement Predictor</h2>

    <form action="/predict" method="POST">
        <!-- Numerical Features -->
        <div class="form-group">
            <label for="age">Age (years):</label>
            <input type="number" id="age" name="Age" required min="10" max="100">
        </div>

        <div class="form-group">
            <label for="height">Height (cm):</label>
            <input type="number" step="0.1" id="height" name="Height_cm" required>
        </div>

        <div class="form-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" step="0.1" id="weight" name="Weight_kg" required>
        </div>

        <div class="form-group">
            <label for="water">Water Intake (Liters):</label>
            <input type="number" step="0.1" id="water" name="Water_Intake_Liters" required>
        </div>

        <!-- Mapped Categorical Features -->
        <div class="form-group">
            <label for="gender">Gender:</label>
            <select id="gender" name="Gender" required>
                <option value="0">Male</option>
                <option value="1">Female</option>
                <option value="2">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="activity">Activity Level:</label>
            <select id="activity" name="Activity_Level" required>
                <option value="0">Sedentary</option>
                <option value="1">Lightly Active</option>
                <option value="2">Moderately Active</option>
                <option value="3">Very Active</option>
                <option value="4">Athlete</option>
            </select>
        </div>

        <div class="form-group">
            <label for="health">Health Status:</label>
            <select id="health" name="Health_Status" required>
                <option value="0">Underweight</option>
                <option value="1">Healthy</option>
                <option value="2">Overweight</option>
                <option value="3">Obese</option>
            </select>
        </div>

        <!-- One-Hot Encoded Categorical Dropdown -->
        <div class="form-group">
            <label for="diet">Diet Type:</label>
            <select id="diet" name="Diet_Type" required>
                <option value="Balanced">Balanced / Standard</option> <!-- Reference Category (drop_first) -->
                <option value="High Protein">High Protein</option>
                <option value="Keto">Keto</option>
                <option value="Mediterranean">Mediterranean</option>
                <option value="Vegan">Vegan</option>
                <option value="Vegetarian">Vegetarian</option>
            </select>
        </div>

        <button type="submit">Predict Calories</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h3>Estimated Daily Calorie Need: {{ prediction }} kcal</h3>
    </div>
    {% endif %}

</body>
</html>
